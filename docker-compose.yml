version: "3.9"

# ================================================================
#  ГЕНЕРАТОР ДАНЕТОК — Docker Compose
#  Запуск: docker-compose up --build
#  Все сервисы находятся в единой сети danetka-net
# ================================================================

services:

  # --------------------------------------------------------------
  #  ИНФРАСТРУКТУРА
  # --------------------------------------------------------------

  consul:
    image: consul:1.15
    container_name: danetka-consul
    ports:
      - "8500:8500"     # веб-интерфейс: http://localhost:8500
    command: agent -server -bootstrap -ui -client=0.0.0.0
    networks:
      - danetka-net
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: danetka-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - danetka-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: danetka-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"     # для подключения из хост-машины (тестирование)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - danetka-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16
    container_name: danetka-postgres
    environment:
      POSTGRES_USER: danetka
      POSTGRES_PASSWORD: danetka_secret
    ports:
      - "5432:5432"     # для подключения из хост-машины (тестирование)
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - danetka-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U danetka"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: danetka-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: danetka
      MONGO_INITDB_ROOT_PASSWORD: danetka_secret
      MONGO_INITDB_DATABASE: parser_db
    ports:
      - "27017:27017"   # для подключения из хост-машины (тестирование)
    volumes:
      - mongodb-data:/data/db
    networks:
      - danetka-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: danetka-ollama
    ports:
      - "11434:11434"   # для тестирования из хост-машины (curl)
    volumes:
      - ollama-data:/root/.ollama   # кэш скачанных моделей
    networks:
      - danetka-net
    # Раскомментируй блок ниже на машинах с NVIDIA GPU.
    # Требуется установленный NVIDIA Container Toolkit.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------
  #  СЕРВИСЫ
  # --------------------------------------------------------------

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: danetka-gateway
    ports:
      - "8000:8000"     # единственный порт открытый наружу для клиентов
    environment:
      PORT: 8000
      CONSUL_ADDR: consul:8500
      # Адреса сервисов — Gateway получает их через Consul,
      # но эти переменные используются как fallback
      AUTH_SERVICE_ADDR: auth-service:50051
      PUZZLE_SERVICE_ADDR: puzzle-service:50052
      PARSER_SERVICE_ADDR: parser-service:50053
    depends_on:
      consul:
        condition: service_healthy
    networks:
      - danetka-net
    restart: on-failure

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: danetka-auth
    # порт НЕ пробрасывается наружу — только внутри Docker-сети
    environment:
      GRPC_PORT: 50051
      CONSUL_ADDR: consul:8500
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: danetka
      DB_PASSWORD: danetka_secret
      JWT_SECRET: change_me_in_production_super_secret_key_32_bytes
      JWT_ISSUER: Danetka.Auth
      JWT_AUDIENCE: Danetka.Gateway
      JWT_EXPIRES_HOURS: 1
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - danetka-net
    restart: on-failure

  puzzle-service:
    build:
      context: .
      dockerfile: Services/puzzle-service/Dockerfile
    container_name: danetka-puzzle
    environment:
      GRPC_PORT: 50052
      CONSUL_ADDR: consul:8500
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: puzzle_db
      DB_USER: danetka
      DB_PASSWORD: danetka_secret
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - danetka-net
    restart: on-failure

  ai-worker:
    build:
      # Context = корень репо: Dockerfile нужен доступ к contracts/ для protobuf-кодогенерации.
      # Папка Services с большой буквы — так зафиксировано в git, регистр важен для Linux/BuildKit.
      context: .
      dockerfile: Services/ai-worker/Dockerfile
    container_name: danetka-ai-worker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_GROUP: ai-worker-group
      KAFKA_TOPIC_INPUT: stories.raw
      KAFKA_TOPIC_DLQ: stories.dlq
      PUZZLE_SERVICE_ADDR: puzzle-service:50052

      # LLM provider — выбирается из .env (см. .env.example).
      # По умолчанию ollama (локальный контейнер в этой же сети).
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}

      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}

      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY:-}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      GIGACHAT_TRUST_ALL_CERTS: ${GIGACHAT_TRUST_ALL_CERTS:-false}

      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-chat}
    depends_on:
      kafka:
        condition: service_healthy
      ollama:
        condition: service_healthy
      # puzzle-service не указываем намеренно — он ещё не реализован,
      # а DLQ + retry-логика и так корректно переживут его отсутствие.
    networks:
      - danetka-net
    restart: on-failure

  parser-service:
    build:
      context: ./Services/parser-service
      dockerfile: Dockerfile
    container_name: danetka-parser
    environment:
      GRPC_PORT: 50053
      CONSUL_ADDR: consul:8500
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092 
      KAFKA_TOPIC_OUTPUT: stories.raw
      MONGO_URI: mongodb://danetka:danetka_secret@mongodb:27017/parser_db?authSource=admin
      MONGO_DB: parser_db
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - danetka-net
    restart: on-failure

# ================================================================
#  СЕТИ И ТОМА
# ================================================================

networks:
  danetka-net:
    driver: bridge

volumes:
  postgres-data:
  mongodb-data:
  ollama-data:
