name: danetka

services:

  # Infrastructure
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: danetka-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - danetka-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: danetka-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - danetka-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16
    container_name: danetka-postgres
    environment:
      POSTGRES_USER: danetka
      POSTGRES_PASSWORD: danetka_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - danetka-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U danetka"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: danetka-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: danetka
      MONGO_INITDB_ROOT_PASSWORD: danetka_secret
      MONGO_INITDB_DATABASE: parser_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - danetka-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: danetka-redis
    ports:
      - "6379:6379"
    networks:
      - danetka-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Services
  gateway:
    build:
      context: .
      dockerfile: Services/gateway/Dockerfile
    environment:
      PORT: 8000
      AUTH_SERVICE_ADDR: auth-service:50051
      PUZZLE_SERVICE_ADDR: puzzle-service:50052
      PARSER_SERVICE_ADDR: parser-service:50053
    deploy:
      replicas: 2
    networks:
      - danetka-net
    restart: on-failure

  nginx:
    image: nginx:1.25-alpine
    container_name: danetka-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - gateway
      - frontend
    networks:
      - danetka-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: danetka-frontend
    networks:
      - danetka-net

  auth-service:
    build:
      context: .
      dockerfile: Services/auth-service/Dockerfile
    container_name: danetka-auth
    environment:
      ASPNETCORE_URLS: http://+:50051
      GRPC_PORT: 50051
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: danetka
      DB_PASSWORD: danetka_secret
      JWT_SECRET: danetka_dev_jwt_secret_min_32_chars_ok
      JWT_ISSUER: Danetka.Auth
      JWT_AUDIENCE: Danetka.Gateway
      JWT_EXPIRES_HOURS: 1
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - danetka-net
    restart: on-failure

  puzzle-service:
    build:
      context: .
      dockerfile: Services/puzzle-service/Dockerfile
    container_name: danetka-puzzle
    environment:
      GRPC_PORT: 50052
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: puzzle_db
      DB_USER: danetka
      DB_PASSWORD: danetka_secret
      REDIS_CONNECTION: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - danetka-net
    restart: on-failure

  ai-worker:
    build:
      context: .
      dockerfile: Services/ai-worker/Dockerfile
    container_name: danetka-ai-worker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_GROUP: ai-worker-group
      KAFKA_TOPIC_INPUT: stories.raw
      KAFKA_TOPIC_DLQ: stories.dlq
      PUZZLE_SERVICE_ADDR: puzzle-service:50052
      LLM_PROVIDER: ${LLM_PROVIDER:-routerai}
      ROUTER_AI_KEY: ${ROUTER_AI_KEY:-}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - danetka-net
    restart: on-failure

  parser-service:
    build:
      context: ./Services/parser-service
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.org files.pythonhosted.org}
    container_name: danetka-parser
    environment:
      GRPC_PORT: 50053
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_OUTPUT: stories.raw
      MONGO_URI: mongodb://danetka:danetka_secret@mongodb:27017/parser_db?authSource=admin
      MONGO_DB: parser_db
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - danetka-net
    restart: on-failure

networks:
  danetka-net:
    driver: bridge

volumes:
  postgres-data:
  mongodb-data:
