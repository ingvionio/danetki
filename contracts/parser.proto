syntax = "proto3";

package parser;

option go_package = "github.com/danetka/contracts/parser";
option csharp_namespace = "Danetka.Contracts.Parser";

service ParserService {
  rpc StartParsing (StartParsingRequest) returns (StartParsingResponse);
  rpc GetStatus (GetStatusRequest) returns (GetStatusResponse);
  rpc ListJobs (ListJobsRequest) returns (ListJobsResponse);
}

message StartParsingRequest {
  int32  limit       = 1;  // max stories; 0 = unlimited
  string source_url  = 2;  // optional source filter; empty = all
}

message StartParsingResponse {
  string job_id  = 1;
  string message = 2;
}

message GetStatusRequest {
  string job_id = 1;  // empty = latest job
}

message GetStatusResponse {
  string job_id        = 1;
  Status status        = 2;
  int32  total_found   = 3;
  int32  total_queued  = 4;
  int32  total_skipped = 5;
  string error         = 6;
  int64  started_at    = 7;
  int64  finished_at   = 8;  // 0 if still running
}

message ListJobsRequest {
  int32 page      = 1;
  int32 page_size = 2;
}

message JobSummary {
  string job_id        = 1;
  Status status        = 2;
  string source_url    = 3;
  int32  limit         = 4;
  int32  total_found   = 5;
  int32  total_queued  = 6;
  int32  total_skipped = 7;
  string error         = 8;
  int64  started_at    = 9;
  int64  finished_at   = 10;
}

message ListJobsResponse {
  repeated JobSummary jobs = 1;
  int32                 total = 2;
  int32                 page  = 3;
}

enum Status {
  STATUS_UNKNOWN  = 0;
  STATUS_RUNNING  = 1;
  STATUS_DONE     = 2;
  STATUS_FAILED   = 3;
}
