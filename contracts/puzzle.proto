syntax = "proto3";

package puzzle;

option go_package = "github.com/danetka/contracts/puzzle";
option csharp_namespace = "Danetka.Contracts.Puzzle";

service PuzzleService {
  rpc GetRandomPuzzle (GetRandomPuzzleRequest) returns (PuzzleResponse);
  rpc GetPuzzleById (GetPuzzleByIdRequest) returns (PuzzleResponse);
  rpc RevealPuzzleAnswer (GetPuzzleByIdRequest) returns (RevealAnswerResponse);
  rpc ListPuzzles (ListPuzzlesRequest) returns (ListPuzzlesResponse);
  rpc SavePuzzle (SavePuzzleRequest) returns (SavePuzzleResponse);
  rpc CountPuzzlesByJob (CountPuzzlesByJobRequest) returns (CountPuzzlesByJobResponse);
}

message GetRandomPuzzleRequest {
  repeated string exclude_ids = 1;  // puzzle IDs to exclude
}

message GetPuzzleByIdRequest {
  string puzzle_id = 1;
}

message RevealAnswerResponse {
  string puzzle_id   = 1;
  string hidden_part = 2;
}

message ListPuzzlesRequest {
  int32 page      = 1;  // 1-based page number
  int32 page_size = 2;  // max 50
}

message ListPuzzlesResponse {
  repeated PuzzleResponse puzzles = 1;
  int32                   total   = 2;
  int32                   page    = 3;
}

message PuzzleResponse {
  string puzzle_id   = 1;
  string open_part   = 2;  // visible puzzle text
  string source_url  = 3;
  int64  created_at  = 4;  // Unix timestamp
}

message SavePuzzleRequest {
  string open_part   = 1;
  string hidden_part = 2;
  string source_url  = 3;
  string story_id    = 4;  // source story UUID
  string job_id      = 5;  // parser job UUID
}

message CountPuzzlesByJobRequest {
  string job_id = 1;
}

message CountPuzzlesByJobResponse {
  int32 count = 1;
}

message SavePuzzleResponse {
  string puzzle_id = 1;
  bool   success   = 2;
}
