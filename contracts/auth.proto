syntax = "proto3";

package auth;

option go_package = "github.com/danetka/contracts/auth";
option csharp_namespace = "Danetka.Contracts.Auth";

service AuthService {
  rpc Register (RegisterRequest) returns (AuthResponse);
  rpc Login (LoginRequest) returns (AuthResponse);
  rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUser (GetUserRequest) returns (UserResponse);
}

message RegisterRequest {
  string email    = 1;
  string password = 2;  // min 8 chars, hashed server-side
  string username = 3;
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message AuthResponse {
  string user_id    = 1;
  string token      = 2;  // JWT access token
  int64  expires_at = 3;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool   valid   = 1;
  string user_id = 2;
  string email   = 3;
  string role    = 4;
}

message GetUserRequest {
  string user_id = 1;
}

enum Role {
  USER  = 0;
  ADMIN = 1;
}

message UserResponse {
  string user_id    = 1;
  string email      = 2;
  string username   = 3;
  int64  created_at = 4;
  Role   role       = 5;
}
